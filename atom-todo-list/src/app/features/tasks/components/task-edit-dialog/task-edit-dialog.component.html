<h2 mat-dialog-title>Edit task</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="edit-form" id="edit-task-form" (ngSubmit)="onSave()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" aria-label="Task title" />
      @if (form.controls.title.hasError('required')) {
        <mat-error>Title is required.</mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" aria-label="Task description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-flat-button (click)="onSave()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>

<style>
  .edit-form { display: flex; flex-direction: column; gap: 0.25rem; }
  .full-width { width: 100%; }
</style>
