@if (!isExpanded()) {
  <button mat-flat-button (click)="isExpanded.set(true)" aria-label="Add new task">
    + Add task
  </button>
} @else {
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form" aria-label="New task form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="Task title" aria-label="Task title" />
      @if (form.controls.title.hasError('required')) {
        <mat-error>Title is required.</mat-error>
      } @else if (form.controls.title.hasError('maxlength')) {
        <mat-error>Title cannot exceed 100 characters.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        formControlName="description"
        placeholder="Optional description"
        rows="3"
        aria-label="Task description"
      ></textarea>
    </mat-form-field>

    <div class="form-actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-flat-button type="submit" [disabled]="form.invalid">Add task</button>
    </div>
  </form>
}
